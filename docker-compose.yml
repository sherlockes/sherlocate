version: '3.8'

services:
  sherlocate:
    build: .
    container_name: sherlocate
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - proxy
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy:
    external: true
